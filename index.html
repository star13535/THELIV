        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        .intro-popup-content {

            transform-origin: center center; opacity: 0;

        @keyframes fadeInScale {
            0% { transform: translateY(-30px) scale(0.92); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .intro-popup-content img {

            border: 2px solid #b28970; 
            box-shadow: 0 25px 50px -12px rgba(21, 47, 71, 0.5); 
        }

            line-height: 31px; font-weight: 500; font-style: normal;
            font-size: 14px;
            transition: all 0.2s;
        }

        }

        .card-container img {

            border: 1px solid rgba(178, 137, 112, 0.25); 
            box-shadow: 0 15px 35px -5px rgba(21, 47, 71, 0.08);

        }
        .card-container img:hover {
            transform: translateY(-4px);
        }
        .card-btn-call {

            margin-top: 20px; 
            padding: 15px 0;

            color: #fff; 
            text-decoration: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            box-shadow: 0 8px 16px -4px rgba(21, 47, 71, 0.3);
            border: 1px solid rgba(178, 137, 112, 0.3);

        }
        .card-btn-call:hover {
            background: linear-gradient(135deg, #b28970, #96715b); 
            border-color: #96715b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -4px rgba(178, 137, 112, 0.4);
        }

        .res-container { 
            border: 1px solid #b28970; 
            border-radius: 24px; 
            padding: 30px 24px; 
            background: linear-gradient(135deg, #112538, #1c3d5c); 
            box-shadow: 0 20px 40px -10px rgba(21, 47, 71, 0.3);

        }

            border-radius: 10px;

        .res-input:focus {

        }
        .res-btn {

            color: #ffffff; 
            border: none; 
            border-radius: 10px; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer;

            border-bottom: none !important;

            margin-top: 15px;
            margin-bottom: -5px;
            font-weight: 700;

        .size-filter {

        @media (max-width: 1023px) {
            .swipe-hint-text {

            }
            .size-filter::-webkit-scrollbar-thumb {

        @keyframes pulseSwipeHint {

        }

        .filter-btn, .sub-tab-btn {

        .filter-btn:hover, .sub-tab-btn:hover {

        .filter-btn.active, .sub-tab-btn.active {

        .sub-tab-menu { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

        @media (min-width: 1024px) {
            .size-filter {

            .business-card, .reservation-card { 
                position: fixed; 
                top: 55%; 
                width: 320px; 
                z-index: 1100; 
                border: 1px solid rgba(178, 137, 112, 0.3); 
                border-radius: 24px; 
                background: rgba(255, 255, 255, 0.95); 
                backdrop-filter: blur(10px); 
                box-shadow: 0 30px 60px -15px rgba(21, 47, 71, 0.15);

            .business-card { left: 40px; transform: translateY(-50%); }
            .reservation-card { right: 40px; transform: translateY(-50%); }
            .business-card.scrolled, .reservation-card.scrolled { top: 50% !important; }
            
            .main-title .inner-logo { 
                display: block; 
                position: absolute; 
                left: 115px;

                height: 120px; 
                z-index: 1; 
            }
            .main-title .inner-logo img { height: 100%; width: auto; object-fit: contain; }
            .main-title h2 { font-size: 40px; letter-spacing: -2px; }
            .main-title p { font-size: 18px; margin-top: 15px; }
            
            .mobile-res-only { display: none; } 
        }

        /* [7. 모바일 레이아웃] */
        @media (max-width: 1023px) {
            .reservation-card { 
                position: static; 
                border: none; 
                border-top: 8px solid #eef0f2; 
                padding: 50px 20px; 
                background: #fcfdfe; 
            }
            #resCard { display: none; } 
        }
    </style>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            // 1. 초기 데이터 매핑 및 타이틀 세팅
            const name = TEAM_LEADER_NAME;
            const phone = TEAM_LEADER_PHONE;
            const formatted = phone.replace(/(010|011|016|017|018|019)(\d{3,4})(\d{4})/, '$1-$2-$3');
        
            document.querySelectorAll('.set-name').forEach(el => el.innerText = name);
            document.querySelectorAll('.set-phone-text').forEach(el => el.innerText = formatted);
            document.querySelectorAll('.set-phone-link').forEach(el => el.href = "tel:" + phone);
            document.querySelectorAll('.set-name-title').forEach(el => el.innerText = name + " 팀장 상담 예약");
            document.title = "수원 오목천역 더리브 - " + name + " 팀장";

            // 2. 인드로 팝업 노출 제어
            const pop = document.getElementById('introPopup');
            pop.style.display = 'flex';
            document.getElementById('popClose').onclick = () => { pop.style.display = 'none'; };
            pop.onclick = (e) => { if(e.target === pop) pop.style.display = 'none'; };
        
            // 3. 스크롤 및 고정 요소 상태 제어
            window.addEventListener('scroll', function() {
                let s = window.pageYOffset || document.documentElement.scrollTop;
                const pcCard = document.getElementById('pcCard');
                const resCard = document.getElementById('resCard');
        
                if (window.innerWidth >= 1024) {
                    if (s > 100) {
                        pcCard?.classList.add('scrolled');
                        resCard?.classList.add('scrolled');
                    } else {
                        pcCard?.classList.remove('scrolled');
                        resCard?.classList.remove('scrolled');
                    }
                }
        
                document.querySelectorAll('.size-filter, .type-group.active').forEach(el => {
                    if (s > 400) el.classList.add('scrolled');
                    else el.classList.remove('scrolled');
                });
            });
        });

        // 4. 문자 전송 예약 로직
        function sendReservation(nameId, phoneId) {
            const name = document.getElementById(nameId).value;
            let rawPhone = document.getElementById(phoneId).value;
            let phone = rawPhone.replace(/[^0-9]/g, "");
        
            if (!name || !phone) {
                alert("성함과 연락처를 모두 입력해주세요.");
                return;
            }
        
            let formattedPhone = "";
            if (phone.length === 11) {
                formattedPhone = phone.replace(/(010|011|016|017|018|019)(\d{3,4})(\d{4})/, '$1-$2-$3');
            } else if (phone.length === 10) {
                formattedPhone = phone.replace(/(010|011|016|017|018|019)(\d{3})(\d{4})/, '$1-$2-$3');
            } else {
                formattedPhone = phone; 
            }
        
            const message = `안녕하세요. ${name}입니다.\n${formattedPhone}로 수원 오목천역 더리브 전화 상담 신청합니다.`;
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const isAndroid = /Android/i.test(navigator.userAgent);
            
            const smsLink = `sms:${TEAM_LEADER_PHONE}${isIOS ? '&' : '?'}body=${encodeURIComponent(message)}`;        
            if (isIOS || isAndroid) {
                window.location.href = smsLink;
            } else {
                const formatted = TEAM_LEADER_PHONE.replace(/(010|011|016|017|018|019)(\d{3,4})(\d{4})/, '$1-$2-$3');
                alert(`PC에서는 문자 전송이 지원되지 않을 수 있습니다.\n\n[상담 예약 접수 안내]\n${TEAM_LEADER_NAME} 팀장 번호: ${formatted}\n\n위 번호로 문자를 보내주시면 바로 연락드리겠습니다! ✨`);
            }
        }

        // 5. 탭 변경 제어
        function openTab(e, t) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(t).classList.add("active");
            e.currentTarget.classList.add("active");
            
            if(t === 'tab2') changeViewMode(null, 'photo-view');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 6. 단지 안내 / 평면도 안내 뷰 전환
        function changeViewMode(e, m) {
            document.querySelectorAll('.mode-content, .mode-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(m).classList.add('active');
            if(e) {
                e.currentTarget.classList.add('active');
                // window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                document.querySelector('.mode-btn').classList.add('active');
            }
            
            if(m === 'photo-view') document.querySelector('#photo-view .sub-tab-btn').click();
            else document.querySelector('.filter-btn').click();
        }

        // 7. 평면도 평형 필터링
        function filterSize(e, s) {
            document.querySelectorAll('#plan-view .type-group, .filter-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            e.currentTarget.classList.add('active');
            document.getElementById(s).querySelector('.sub-tab-btn').click();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 8. 서브 탭 제어
        function openSubTab(e, s, p) {
            const parent = document.getElementById(p);
            parent.querySelectorAll(".sub-tab-content, .sub-tab-btn").forEach(x => x.classList.remove("active"));
            document.getElementById(s).classList.add("active");
            e.currentTarget.classList.add("active");
            // window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
